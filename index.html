<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Budget Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif}
body{background:#f5f6fa}
.page{max-width:900px;margin:auto;padding:20px}

.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}

h2{margin-bottom:10px}

.input-row{display:flex;gap:10px;margin-bottom:10px}
input,select,button{padding:10px;border-radius:6px;border:1px solid #ccc}
button{cursor:pointer;background:#007bff;color:white;border:none}

.log-item{display:flex;justify-content:space-between;margin:5px 0;padding:5px;border-bottom:1px solid #eee}

.stat{font-size:18px;margin:5px 0}
</style>
</head>

<body>

<div class="page">

<div class="card">
<h2>Daily Budget</h2>

<div class="stat">Limit: ₹<span id="limit">500</span></div>
<div class="stat">Spent: ₹<span id="spent">0</span></div>
<div class="stat">Remaining: ₹<span id="remaining">500</span></div>
<div class="stat">Balance: ₹<span id="balance">0</span></div>

</div>

<div class="card">
<h2>Add Expense</h2>

<div class="input-row">
<input type="number" id="amount" placeholder="Amount">
<input type="text" id="note" placeholder="Note">
<select id="category">
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Shopping">Shopping</option>
<option value="Other">Other</option>
</select>
<button onclick="addExpense()">Add</button>
</div>

</div>

<div class="card">
<h2>Today's Expenses</h2>
<div id="log"></div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("budgetData")) || {
balance: 3738,
limit: 500,
entries: []
};

function save(){
localStorage.setItem("budgetData", JSON.stringify(data));
}

function render(){

let spent = data.entries.reduce((sum,e)=>sum+e.amount,0);
let remaining = data.limit - spent;

document.getElementById("limit").innerText = data.limit;
document.getElementById("spent").innerText = spent;
document.getElementById("remaining").innerText = remaining;
document.getElementById("balance").innerText = data.balance - spent;

let log = document.getElementById("log");
log.innerHTML = "";

data.entries.forEach((e,i)=>{
let div = document.createElement("div");
div.className="log-item";
div.innerHTML = `
<span>${e.note} (${e.category})</span>
<span>₹${e.amount} <button onclick="deleteExpense(${i})">x</button></span>
`;
log.appendChild(div);
});

}

function addExpense(){

let amt = parseFloat(document.getElementById("amount").value);
let note = document.getElementById("note").value;
let cat = document.getElementById("category").value;

if(!amt || amt<=0) return;

data.entries.push({amount:amt, note:note || "Expense", category:cat});

save();
render();

document.getElementById("amount").value="";
document.getElementById("note").value="";

}

function deleteExpense(index){
data.entries.splice(index,1);
save();
render();
}

render();

</script>

</body>
</html>
